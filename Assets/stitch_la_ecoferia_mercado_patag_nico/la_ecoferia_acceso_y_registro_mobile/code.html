<style>

            position: absolute;
            inset: 0;
            pointer-events: none;
            opacity: 0.05;

<body class="bg-surface text-on-surface min-h-screen flex flex-col relative font-body-md overflow-x-hidden selection:bg-primary-fixed selection:text-on-primary-fixed">
<!-- Background Texture -->
<div class="noise-overlay z-0"></div>
<!-- Header (Suppressed Navigation Shell, keeping Logo only for Transactional) -->
<header class="w-full flex justify-center items-center py-xl relative z-10">
<span class="font-display-lg text-primary text-headline-md">La Ecoferia</span>
</header>
<!-- Main Content -->
<main class="flex-grow flex items-center justify-center px-container-margin pb-xl relative z-10 w-full max-w-[500px] mx-auto">
<!-- Auth Card Container -->
<div class="w-full bg-surface-container-lowest rounded-xl shadow-sm border border-[#DCC7A1] overflow-hidden relative">
<div class="noise-overlay opacity-[0.03]"></div>
<!-- Tabs -->
<div class="flex border-b border-[#DCC7A1] relative z-10">
<button class="flex-1 py-md text-center font-title-lg text-title-lg text-primary border-b-2 border-primary transition-colors" id="tab-login" onclick="switchTab('login')">Ingresar</button>
<button class="flex-1 py-md text-center font-title-lg text-title-lg text-on-surface-variant border-b-2 border-transparent transition-colors" id="tab-register" onclick="switchTab('register')">Crear cuenta</button>
</div>
<!-- Tab Content Area -->
<div class="p-lg relative z-10">
<!-- Login Form -->
<form class="flex flex-col gap-lg transition-opacity duration-300" id="form-login">
<div class="flex flex-col gap-sm">
<label class="font-label-caps text-label-caps text-on-surface-variant" for="login-email">Correo electrónico</label>
<input class="input-paper w-full px-sm py-sm font-body-md text-body-md text-on-surface rounded-t-sm" id="login-email" placeholder="tu@correo.com" type="email">
</div>
<div class="flex flex-col gap-sm">
<label class="font-label-caps text-label-caps text-on-surface-variant" for="login-password">Contraseña</label>
<input class="input-paper w-full px-sm py-sm font-body-md text-body-md text-on-surface rounded-t-sm" id="login-password" placeholder="••••••••" type="password">
<a class="font-headline-md text-[14px] text-on-surface-variant hover:text-primary self-end mt-xs transition-colors" href="#">Olvidé mi contraseña</a>
</div>
<button class="w-full bg-tertiary-container text-on-tertiary-container font-title-lg text-title-lg py-md rounded-lg shadow-sm hover:shadow-md transition-shadow active:translate-y-[1px]" type="button">Ingresar</button>
<div class="flex items-center gap-md my-sm">
<div class="h-px bg-[#DCC7A1] flex-grow"></div>
<span class="font-body-sm text-body-sm text-on-surface-variant">o</span>
<div class="h-px bg-[#DCC7A1] flex-grow"></div>
</div>
<button class="w-full bg-surface-container-low text-on-surface border border-[#DCC7A1] font-title-lg text-[16px] py-md rounded-lg flex items-center justify-center gap-sm hover:bg-surface-variant transition-colors" type="button">
<svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">

<path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"></path>
<path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"></path>

</svg>
                        Continuar con Google
                    </button>
</form>
<!-- Registration Form (Hidden by default) -->
<form class="hidden flex-col gap-lg transition-opacity duration-300" id="form-register">
<div class="flex flex-col gap-sm">
<label class="font-label-caps text-label-caps text-on-surface-variant" for="reg-email">Correo electrónico</label>
<input class="input-paper w-full px-sm py-sm font-body-md text-body-md text-on-surface rounded-t-sm" id="reg-email" placeholder="tu@correo.com" type="email">
</div>
<div class="flex flex-col gap-sm">
<label class="font-label-caps text-label-caps text-on-surface-variant" for="reg-password">Contraseña</label>
<input class="input-paper w-full px-sm py-sm font-body-md text-body-md text-on-surface rounded-t-sm" id="reg-password" placeholder="Min. 8 caracteres" type="password">
</div>
<!-- Role Selector -->

<div class="grid grid-cols-2 gap-sm">
<label class="cursor-pointer">
<input checked="" class="peer sr-only" name="role" type="radio" value="buyer">
<div class="p-sm text-center border border-[#DCC7A1] rounded-lg peer-checked:bg-primary-container peer-checked:text-on-primary-container peer-checked:border-primary-container transition-colors font-body-sm text-body-sm h-full flex items-center justify-center">

<label class="cursor-pointer flex flex-col">

<div class="p-sm text-center border border-[#DCC7A1] rounded-lg peer-checked:bg-primary-container peer-checked:text-on-primary-container peer-checked:border-primary-container transition-colors font-body-sm text-body-sm h-full flex flex-col items-center justify-center">
                                    Quiero vender
                                </div>
<span class="font-body-sm text-[10px] text-on-surface-variant mt-xs text-center leading-tight">Sujeto a aprobación</span>
</label>
</div>

<div class="flex items-center gap-md my-xs">
<div class="h-px bg-[#DCC7A1] flex-grow"></div>
<span class="font-body-sm text-body-sm text-on-surface-variant">o</span>
<div class="h-px bg-[#DCC7A1] flex-grow"></div>
</div>
<button class="w-full bg-surface-container-low text-on-surface border border-[#DCC7A1] font-title-lg text-[16px] py-md rounded-lg flex items-center justify-center gap-sm hover:bg-surface-variant transition-colors" type="button">

<path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"></path>
<path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"></path>
<path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"></path>
<path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"></path>
</svg>
                        Continuar con Google
                    </button>
</form>
</div>
</div>
</main>
<script>
        function switchTab(tabName) {
            const loginForm = document.getElementById('form-login');
            const registerForm = document.getElementById('form-register');
            const loginTab = document.getElementById('tab-login');
            const registerTab = document.getElementById('tab-register');

            if (tabName === 'login') {
                loginForm.classList.remove('hidden');
                loginForm.classList.add('flex');
                registerForm.classList.add('hidden');
                registerForm.classList.remove('flex');

                loginTab.classList.replace('text-on-surface-variant', 'text-primary');
                loginTab.classList.replace('border-transparent', 'border-primary');
                
                registerTab.classList.replace('text-primary', 'text-on-surface-variant');
                registerTab.classList.replace('border-primary', 'border-transparent');
            } else {
                registerForm.classList.remove('hidden');
                registerForm.classList.add('flex');
                loginForm.classList.add('hidden');
                loginForm.classList.remove('flex');

                registerTab.classList.replace('text-on-surface-variant', 'text-primary');
                registerTab.classList.replace('border-transparent', 'border-primary');
                
                loginTab.classList.replace('text-primary', 'text-on-surface-variant');
                loginTab.classList.replace('border-primary', 'border-transparent');
            }
        }
    </script>
