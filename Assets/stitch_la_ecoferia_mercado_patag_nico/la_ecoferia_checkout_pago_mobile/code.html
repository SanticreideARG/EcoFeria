<style>
        body {
            background-color: #F9F7F2;
            background-image: url("data:image/svg+xml,%3Csvg width='100' height='100' viewBox='0 0 100 100' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100' height='100' filter='url(%23noise)' opacity='0.05'/%3E%3C/svg%3E");
        }
        
        /* Custom Radio Styling */
        input[type="radio"]:checked + div {
            border-color: #7D8E74 !important; /* Sage primary equivalent */
            background-color: #F8FFEF; /* on-primary-container */
        }
        input[type="radio"]:checked + div .radio-indicator {
            border-color: #7D8E74;
            background-color: #7D8E74;
        }
        input[type="radio"]:checked + div .radio-indicator::after {
            opacity: 1;
        }
    </style>

<body class="text-on-background min-h-screen flex flex-col font-body-md pb-[120px]">
<!-- TopAppBar -->
<header class="bg-surface dark:bg-surface font-headline-md text-headline-md-mobile md:text-headline-md docked full-width top-0 sticky z-50 bg-surface border-b border-outline-variant flat no shadows">
<div class="flex items-center justify-between px-gutter w-full h-16 max-w-[1280px] mx-auto">
<button aria-label="Go back" class="text-primary dark:text-primary-fixed hover:opacity-80 transition-opacity active:scale-95 transition-transform p-2 rounded-full hover:bg-surface-container-low">
<span class="material-symbols-outlined">arrow_back</span>
</button>
<h1 class="font-headline-md text-headline-md text-primary dark:text-primary-fixed">La Ecoferia</h1>
<div class="w-10"></div> <!-- Spacer for balance -->
</div>
</header>
<main class="flex-grow w-full max-w-[1280px] mx-auto px-container-margin md:px-xl py-lg">
<div class="max-w-2xl mx-auto w-full">
<h2 class="font-display-lg-mobile md:font-display-lg text-display-lg-mobile md:text-display-lg text-primary mb-xl">Checkout</h2>
<!-- Stepper -->
<div class="flex items-center justify-between mb-xl relative">
<div class="absolute left-0 top-1/2 -translate-y-1/2 w-full h-[1px] bg-outline-variant z-0"></div>
<div class="relative z-10 flex flex-col items-center gap-sm bg-[#F9F7F2] px-sm">
<div class="w-8 h-8 rounded-full bg-surface-container border border-outline-variant flex items-center justify-center text-on-surface-variant font-body-sm text-body-sm">
<span class="material-symbols-outlined text-[16px]">check</span>
</div>
<span class="font-label-caps text-label-caps text-on-surface-variant">Shipping</span>
</div>
<div class="relative z-10 flex flex-col items-center gap-sm bg-[#F9F7F2] px-sm">
<div class="w-8 h-8 rounded-full bg-primary text-on-primary flex items-center justify-center font-body-sm text-body-sm shadow-sm translate-y-[-2px]">
                        2
                    </div>
<span class="font-label-caps text-label-caps text-primary font-bold">Payment</span>
</div>
<div class="relative z-10 flex flex-col items-center gap-sm bg-[#F9F7F2] px-sm">
<div class="w-8 h-8 rounded-full bg-surface-container border border-outline-variant flex items-center justify-center text-on-surface-variant font-body-sm text-body-sm">
                        3
                    </div>
<span class="font-label-caps text-label-caps text-on-surface-variant">Confirm</span>
</div>
</div>
<!-- Shipping Summary -->
<section class="mb-xl">
<h3 class="font-title-lg text-title-lg text-primary mb-md">Shipping to</h3>
<div class="bg-surface border border-[#DCC7A1] rounded-lg p-md shadow-[0_4px_24px_rgba(62,74,57,0.04)] relative">
<div class="absolute inset-0 bg-[#DCC7A1] opacity-5 mix-blend-multiply pointer-events-none rounded-lg"></div>
<div class="flex justify-between items-start">
<div>
<p class="font-body-md text-body-md text-on-surface font-semibold mb-xs">Maria Garcia</p>
<p class="font-body-sm text-body-sm text-on-surface-variant">Calle Falsa 123, Depto 4B</p>
<p class="font-body-sm text-body-sm text-on-surface-variant">San Carlos de Bariloche, Río Negro</p>
<p class="font-body-sm text-body-sm text-on-surface-variant mt-sm">Standard Delivery (3-5 business days)</p>
</div>
<button class="text-secondary font-label-caps text-label-caps hover:opacity-80 transition-opacity">Edit</button>
</div>
</div>
</section>
<!-- Payment Methods -->
<section>
<h3 class="font-title-lg text-title-lg text-primary mb-md">Select Payment Method</h3>
<div class="flex flex-col gap-md">
<!-- Option 1: Credit/Debit -->
<label class="cursor-pointer relative block">
<input checked="" class="peer sr-only" name="payment_method" type="radio">
<div class="bg-surface border border-outline-variant rounded-lg p-lg hover:bg-surface-container-low transition-colors shadow-sm peer-checked:shadow-md flex items-center gap-md">
<div class="radio-indicator w-5 h-5 rounded-full border-2 border-outline-variant flex items-center justify-center relative transition-colors">
<div class="w-2.5 h-2.5 rounded-full bg-white opacity-0 transition-opacity absolute"></div>
</div>
<span class="material-symbols-outlined text-primary text-[28px]">credit_card</span>
<div class="flex-grow">
<p class="font-body-md text-body-md font-semibold text-on-surface">Credit / Debit Card</p>
<p class="font-body-sm text-body-sm text-on-surface-variant">Visa, Mastercard, Amex</p>
</div>
</div>
</label>
<!-- Option 2: Mercado Pago -->
<label class="cursor-pointer relative block">
<input class="peer sr-only" name="payment_method" type="radio">
<div class="bg-surface border border-outline-variant rounded-lg p-lg hover:bg-surface-container-low transition-colors shadow-sm peer-checked:shadow-md flex items-center gap-md">
<div class="radio-indicator w-5 h-5 rounded-full border-2 border-outline-variant flex items-center justify-center relative transition-colors">
<div class="w-2.5 h-2.5 rounded-full bg-white opacity-0 transition-opacity absolute"></div>
</div>
<span class="material-symbols-outlined text-[#009EE3] text-[28px]">account_balance_wallet</span>
<div class="flex-grow">
<p class="font-body-md text-body-md font-semibold text-on-surface">Mercado Pago Balance</p>
<p class="font-body-sm text-body-sm text-on-surface-variant">Pay with your account balance</p>
</div>
</div>
</label>
<!-- Option 3: Cash -->
<label class="cursor-pointer relative block">
<input class="peer sr-only" name="payment_method" type="radio">
<div class="bg-surface border border-outline-variant rounded-lg p-lg hover:bg-surface-container-low transition-colors shadow-sm peer-checked:shadow-md flex items-center gap-md">
<div class="radio-indicator w-5 h-5 rounded-full border-2 border-outline-variant flex items-center justify-center relative transition-colors">
<div class="w-2.5 h-2.5 rounded-full bg-white opacity-0 transition-opacity absolute"></div>
</div>
<span class="material-symbols-outlined text-primary text-[28px]">payments</span>
<div class="flex-grow">
<p class="font-body-md text-body-md font-semibold text-on-surface">Cash</p>
<p class="font-body-sm text-body-sm text-on-surface-variant">RapiPago, PagoFácil</p>
</div>
</div>
</label>
</div>
</section>
</div>
</main>
<!-- BottomNavBar (Transaction Footer) -->
<nav class="bg-surface-container dark:bg-inverse-surface font-label-caps text-label-caps font-title-lg text-title-lg text-primary docked full-width bottom-0 fixed z-50 bg-surface-container border-t border-outline-variant shadow-sm flex items-center justify-between px-4 py-2 pb-safe fixed bottom-0 left-0 w-full flex justify-between items-center px-4 py-3 pb-safe bg-surface border-t border-outline-variant">
<div class="flex flex-col ml-gutter">
<span class="font-body-sm text-body-sm text-on-surface-variant">Total</span>
<span class="font-title-lg text-title-lg text-secondary">$14,500 ARS</span>
</div>
<button class="bg-[#7D8E74] text-white font-body-md text-body-md font-semibold py-3 px-8 rounded-lg shadow-md hover:opacity-90 active:scale-95 transition-all mr-gutter">
            Review Order
        </button>
</nav>
</body></html>
